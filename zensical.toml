[project]
site_name = "Sprite Sheet Helper"
site_url = "https://kyonru.github.io/sprite-sheet-helper/"
site_description = "Build sprite sheets, normal maps, and engine-ready 2D assets from 3D models."
site_author = "Kyonru"
docs_dir = "docs"
site_dir = "site"
copyright = "Copyright &copy; 2026 Kyonru"

nav = [
  { "Overview" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Tutorial" = "tutorial.md" },
  { "App Workflows" = [
    { "Camera" = "camera.md" },
    { "Lighting" = "lighting.md" },
    { "Effects" = "effects.md" },
    { "Effects Recipes" = "effects-recipes.md" },
    { "Animations" = "animations.md" },
    { "Pose Studio" = "pose-studio.md" },
    { "Pose Capture" = "camera-capture.md" },
    { "Projects" = "projects.md" },
  ] },
  { "Export & Automation" = [
    { "Exporting" = "exporting.md" },
    { "Normal Maps" = "normal-maps.md" },
    { "Workflows" = "workflows.md" },
    { "Reproducible Workflows" = "reproducible-workflows.md" },
    { "CLI & Headless Mode" = "cli.md" },
    { "CI, Docker, and GitHub Actions" = "ci.md" },
  ] },
  { "Help" = [
    { "Troubleshooting" = "troubleshooting.md" },
  ] },
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "toc.follow",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]



# ----------------------------------------------------------------------------
# In the "palette" subsection you can configure options for the color scheme.
# You can configure different color schemes, e.g., to turn on dark mode,
# that the user can switch between. Each color scheme can be further
# customized.
#
# Read more:
# - https://zensical.org/docs/setup/colors/
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# The "extra" section contains miscellaneous settings.
# ----------------------------------------------------------------------------
#[[project.extra.social]]
#icon = "fontawesome/brands/github"
#link = "https://github.com/user/repo"

# ----------------------------------------------------------------------------
# In this section you can configure the Markdown extensions that are used when
# rendering your documentation. We enable the most useful extensions by default,
# but you can customize this list to your needs.
#
# Read more:
# - https://zensical.org/docs/setup/extensions/
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.quotes]
callouts = true
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

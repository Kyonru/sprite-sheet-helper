name: CLI

on:
  push:
    branches: [ main, next ]

jobs:
  build-and-test:
    name: Build & smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build CLI (local)
        run: npm run build:cli

      - name: Install Chrome system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgbm1

      - name: Run CLI e2e tests
        run: npm run test:e2e:run

      - name: Smoke test — spritesheet
        run: npm run cli -- example.fbx --format spritesheet --frames 4 --width 64
          --height 64 --output ./sprite-sheet-test

      - name: Verify spritesheet output
        run: |
          test -f ./sprite-sheet-test/spritesheet.png || (echo "spritesheet.png not found" && exit 1)
          test ! -f ./sprite-sheet-test/spritesheet_normal.png || (echo "spritesheet_normal.png should not be emitted by default" && exit 1)
          echo "Output files:"
          ls ./sprite-sheet-test/

      - name: Test export formats
        run: |
          formats=("zip" "gif" "love2d-lua" "love2d-anim8" "turbo" "bevy" "phaser" "godot" "pygame" "raylib" "unity")

          for format in "${formats[@]}"; do
            echo "Testing format: $format"
            output_dir="./format-test-$format"
            npm run cli -- example.fbx --format "$format" --frames 4 --width 64 --height 64 --output "$output_dir"

            # Verify output directory has files
            if [ -z "$(ls -A "$output_dir")" ]; then
              echo "No files generated for format: $format"
              exit 1
            fi

            echo "Output files for $format:"
            ls "$output_dir"
            echo "---"
          done

      - name: Upload spritesheet test output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: spritesheet-test-output
          path: ./sprite-sheet-test/
          retention-days: 3

      - name: Upload format test outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: format-tests-output
          path: ./format-test-*/
          retention-days: 3

      - name: Upload workflow reproducibility outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workflow-reproducibility-output
          path: ./.e2e-artifacts/workflow-reproducibility/
          retention-days: 3

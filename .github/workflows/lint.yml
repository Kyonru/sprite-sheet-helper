name: Lint

on:
  push:
    branches: [main, next]

jobs:
  lint:
    name: Run TypeScript Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run linting
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Build Tauri
        run: npm run build:tauri
